<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="loop-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0.45)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.92)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="44" height="44" rx="10" fill="url(#bg)"/>

  <!-- W mark — bold, geometric -->
  <path d="M5.5 9.5 L11.5 28.5 L22 14.5 L32.5 28.5 L38.5 9.5"
        stroke="white" stroke-width="3.8" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Loop arrow: 270° CW arc, center=(22,36), r=5.5 -->
  <!-- 180° start=(16.5,36), 270°(SVG-top) end=(22,30.5), large-arc=1, sweep=1 -->
  <path d="M16.5 36 A5.5 5.5 0 1 1 22 30.5"
        stroke="url(#loop-grad)" stroke-width="2.2" fill="none"
        stroke-linecap="round"/>
  <!-- Arrowhead at (22,30.5) pointing right -->
  <path d="M19 28 L22 30.5 L19 33"
        stroke="rgba(255,255,255,0.92)" stroke-width="2.2" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
