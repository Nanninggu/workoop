<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- W mark -->
  <path d="M4 7.5 L8.6 21 L16 11.2 L23.4 21 L28 7.5"
        stroke="white" stroke-width="2.7" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Loop arrow: 270° arc, center=(16,26), r=4 -->
  <!-- Start 180° = (12,26), End 270° SVG-top = (16,22), large-arc=1, sweep=1 (CW) -->
  <path d="M12 26 A4 4 0 1 1 16 22"
        stroke="rgba(255,255,255,0.85)" stroke-width="1.6" fill="none"
        stroke-linecap="round"/>
  <!-- Arrowhead pointing right at (16,22) -->
  <path d="M13.8 20.1 L16 22 L13.8 23.9"
        stroke="rgba(255,255,255,0.85)" stroke-width="1.6" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
